<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Bookery</title>
  
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation injected here -->
  <div id="nav-container"></div>

  <!-- Main content -->
  <main>
    <section class="hero-section">
      <div class="hero-txt">
        <h2>Free Books for Cape Town</h2>
        <p>Read online or download free books from our library in English, Zulu, and Afrikaans.</p>
        
        <div class="cta-container">
          <a href="/library.html" class="cta-btn">
            <span class="btn-main-text">Library</span>
            <span class="btn-sub-text">Browse our collection</span>
          </a>
          <a href="/events.html" class="cta-btn">
            <span class="btn-main-text">Events</span>
            <span class="btn-sub-text">See upcoming events</span>
          </a>
        </div>
      </div>
      
      <img src="assets/books-1.jpg" alt="Bookshelf" class="hero-img">
    </section>
  </main>

  <!-- Footer injected here -->
  <div id="footer-container"></div>

  <script src="js/components.js"></script>
</body>
</html>
